<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solar System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 16px 10px 8px;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(13px, 4vw, 20px);
      letter-spacing: 0.25em;
      color: #a0d8ff;
      text-shadow: 0 0 20px rgba(100,180,255,0.6);
    }

    /* Planet name pills */
    .name-bar {
      position: relative;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px 12px;
    }

    .name-pill {
      font-family: 'Orbitron', monospace;
      font-size: clamp(7px, 2.2vw, 10px);
      letter-spacing: 0.1em;
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .name-pill:active { transform: scale(1.15); filter: brightness(1.5); }

    /* Solar system */
    .solar-wrap {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .solar-system {
      position: relative;
      width: min(90vw, 88vh);
      height: min(90vw, 88vh);
    }

    .sun {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 12%;
      height: 12%;
      background: radial-gradient(circle at 35% 35%, #fffde7, #ffeb3b 40%, #ff9800 80%);
      border-radius: 50%;
      box-shadow: 0 0 28px #ffeb3b, 0 0 65px #ff9800, 0 0 110px rgba(255,152,0,0.3);
      animation: sunPulse 3s ease-in-out infinite;
      z-index: 5;
    }

    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 28px #ffeb3b, 0 0 65px #ff9800, 0 0 110px rgba(255,152,0,0.3); }
      50%      { box-shadow: 0 0 45px #ffeb3b, 0 0 90px #ff9800, 0 0 150px rgba(255,152,0,0.45); }
    }

    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: orbitSpin linear infinite;
    }

    @keyframes orbitSpin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }

    .planet-btn {
      position: absolute;
      top: 0; left: 50%;
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: counterSpin linear infinite;
      transition: opacity 0.4s, transform 0.4s;
    }

    @keyframes counterSpin {
      from { transform: translateX(-50%) translateY(-50%) rotate(0deg); }
      to   { transform: translateX(-50%) translateY(-50%) rotate(-360deg); }
    }

    /* Explosion particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      animation: particleExplode var(--dur) ease-out forwards;
    }

    @keyframes particleExplode {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* Popup */
    .popup {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .popup.show {
      opacity: 1;
      pointer-events: auto;
    }

    .popup-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,8,0.78);
      backdrop-filter: blur(8px);
    }

    .popup-card {
      position: relative;
      z-index: 2;
      background: linear-gradient(140deg, rgba(4,8,32,0.98), rgba(8,18,55,0.98));
      border: 1px solid rgba(100,170,255,0.25);
      border-radius: 22px;
      padding: 26px 24px 20px;
      width: min(88vw, 330px);
      text-align: center;
      transform: scale(0.8) translateY(40px);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 60px rgba(60,120,255,0.18), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .popup.show .popup-card {
      transform: scale(1) translateY(0);
    }

    .popup-orb {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 14px;
      animation: orbFloat 2.8s ease-in-out infinite;
    }

    @keyframes orbFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-7px); }
    }

    .popup-name {
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.22em;
      color: #b0daff;
      text-shadow: 0 0 14px rgba(100,180,255,0.45);
      margin-bottom: 4px;
    }

    .popup-sub {
      font-size: 10px;
      letter-spacing: 0.13em;
      color: rgba(140,170,220,0.55);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .popup-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100,180,255,0.25), transparent);
      margin-bottom: 12px;
    }

    .popup-desc {
      font-size: 12.5px;
      line-height: 1.72;
      color: rgba(195,218,255,0.82);
      margin-bottom: 16px;
    }

    .popup-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(100,180,255,0.12);
      border-radius: 10px;
      padding: 7px 5px;
    }

    .stat-label {
      font-size: 8.5px;
      letter-spacing: 0.08em;
      color: rgba(110,155,215,0.55);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: #b8d8ff;
    }

    .popup-close {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(110,155,215,0.65);
      border: 1px solid rgba(100,180,255,0.18);
      background: transparent;
      padding: 7px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .popup-close:active {
      background: rgba(100,180,255,0.1);
      color: #a0d8ff;
    }

    .credit {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 8px;
      color: rgba(90,110,155,0.55);
      font-size: 10px;
    }
    .credit strong { color: rgba(130,155,195,0.75); }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="header"><h1>☀ SOLAR SYSTEM</h1></div>
<div class="name-bar" id="nameBar"></div>

<div class="solar-wrap">
  <div class="solar-system" id="solarSystem">
    <div class="sun"></div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-backdrop" id="backdrop"></div>
  <div class="popup-card">
    <div class="popup-orb" id="pOrb"></div>
    <div class="popup-name" id="pName"></div>
    <div class="popup-sub" id="pSub"></div>
    <div class="popup-divider"></div>
    <div class="popup-desc" id="pDesc"></div>
    <div class="popup-stats" id="pStats"></div>
    <button class="popup-close" id="pClose">✕ CLOSE</button>
  </div>
</div>

<div class="credit">Developed by <strong>Dipto Biswas</strong></div>

<script>
const PLANETS = [
  { name:"Mercury", sub:"1st · Closest to Sun",      color:"#b2b2b2", glow:"rgba(180,180,180,0.6)", bg:"radial-gradient(circle at 35% 35%,#e8e8e8,#999 60%,#666)",   orbit:15, size:3.2, speed:8,   desc:"Smallest planet. A year is only 88 Earth days but a single day lasts 59 Earth days. Surface craters date back 4 billion years.", stats:[["Distance","57.9M km"],["Diameter","4,879 km"],["Moons","0"],["Max Temp","430°C"]] },
  { name:"Venus",   sub:"2nd · Morning Star",         color:"#d4a060", glow:"rgba(200,140,60,0.7)",  bg:"radial-gradient(circle at 35% 35%,#f5d59a,#c8843a 55%,#8b5e28)", orbit:21, size:4.6, speed:15,  desc:"Hottest planet at 465°C — hotter than Mercury! Thick sulfuric acid clouds trap heat in a runaway greenhouse effect.", stats:[["Distance","108.2M km"],["Diameter","12,104 km"],["Moons","0"],["Avg Temp","465°C"]] },
  { name:"Earth",   sub:"3rd · Our Blue Home",        color:"#4a90e2", glow:"rgba(74,144,226,0.8)",  bg:"radial-gradient(circle at 35% 35%,#8ecef5,#2b6cb0 45%,#1a6e2e 80%)", orbit:28, size:5,   speed:26,  desc:"The only known planet with life. 71% covered in water. A magnetic field shields us from deadly solar radiation.", stats:[["Distance","149.6M km"],["Diameter","12,742 km"],["Moons","1"],["Avg Temp","15°C"]] },
  { name:"Mars",    sub:"4th · The Red Planet",       color:"#cd5c5c", glow:"rgba(180,60,60,0.7)",   bg:"radial-gradient(circle at 35% 35%,#e88080,#a03030 60%,#6e1e1e)",  orbit:35, size:4,   speed:42,  desc:"Home to Olympus Mons, the tallest volcano in the solar system at 22 km. Evidence suggests ancient rivers once flowed here.", stats:[["Distance","227.9M km"],["Diameter","6,779 km"],["Moons","2"],["Avg Temp","-60°C"]] },
  { name:"Jupiter", sub:"5th · King of Planets",      color:"#c8a46a", glow:"rgba(200,160,80,0.8)",  bg:"radial-gradient(circle at 35% 35%,#f5e6c8,#c8a46a 45%,#7a5a28)", orbit:43, size:8.5, speed:85,  desc:"1,300 Earths could fit inside Jupiter. Its Great Red Spot is a storm that has been raging for over 350 years.", stats:[["Distance","778.5M km"],["Diameter","139,820 km"],["Moons","95"],["Storm Age","350+ yrs"]] },
  { name:"Saturn",  sub:"6th · Lord of the Rings",    color:"#d4c870", glow:"rgba(210,200,80,0.7)",  bg:"radial-gradient(circle at 35% 35%,#f8f0c0,#d4c870 50%,#a89c4a)", orbit:51, size:7.5, speed:145, rings:true, desc:"Its rings span 282,000 km but are only ~100 m thick. Saturn is so light it could theoretically float on water.", stats:[["Distance","1.43B km"],["Diameter","116,460 km"],["Moons","146"],["Ring Span","282,000 km"]] },
  { name:"Uranus",  sub:"7th · Ice Giant on its Side",color:"#5db8d4", glow:"rgba(93,184,212,0.8)",  bg:"radial-gradient(circle at 35% 35%,#d0f0ff,#5db8d4 55%,#3a8fa8)", orbit:59, size:6,   speed:205, desc:"Rotates tilted at 98°, likely knocked over by a massive ancient collision. It has 13 rings and moons named after Shakespeare.", stats:[["Distance","2.87B km"],["Diameter","50,724 km"],["Moons","27"],["Axial Tilt","97.8°"]] },
  { name:"Neptune", sub:"8th · The Windy Frontier",   color:"#4169e1", glow:"rgba(65,105,225,0.8)",  bg:"radial-gradient(circle at 35% 35%,#8090ff,#1a3cb0 55%,#0e2070)",  orbit:67, size:5.8, speed:285, desc:"Winds reach 2,100 km/h — the strongest in the solar system. Its moon Triton orbits backwards and will one day crash into Neptune.", stats:[["Distance","4.50B km"],["Diameter","49,244 km"],["Moons","16"],["Wind Speed","2,100 km/h"]] }
];

// Stars
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length:200}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.3+0.2,
    t: Math.random()*Math.PI*2,
    sp: Math.random()*0.007+0.003
  }));
}

(function tick() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => {
    s.t += s.sp;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.25+0.55*Math.abs(Math.sin(s.t))})`;
    ctx.fill();
  });
  requestAnimationFrame(tick);
})();

initStars();
window.addEventListener('resize', initStars);

// Build UI
const solar = document.getElementById('solarSystem');
const nameBar = document.getElementById('nameBar');
const planetBtns = [];

PLANETS.forEach((p, i) => {
  // orbit
  const orb = document.createElement('div');
  orb.className = 'orbit';
  orb.style.cssText = `width:${p.orbit*2}%;height:${p.orbit*2}%;animation-duration:${p.speed}s;`;

  // planet
  const btn = document.createElement('div');
  btn.className = 'planet-btn';
  btn.style.cssText = `
    width:${p.size*2}%; height:${p.size*2}%;
    background:${p.bg};
    box-shadow:0 0 ${p.size*4}px ${p.glow};
    animation-duration:${p.speed}s;
  `;

  if (p.rings) {
    const ring = document.createElement('div');
    ring.style.cssText = `position:absolute;top:50%;left:50%;width:200%;height:200%;border:2px solid rgba(220,200,100,0.4);border-radius:50%;transform:translate(-50%,-50%) rotateX(70deg);pointer-events:none;`;
    btn.appendChild(ring);
  }

  const triggerFn = () => trigger(p, btn);
  btn.addEventListener('click', triggerFn);
  btn.addEventListener('touchend', e => { e.preventDefault(); triggerFn(); }, {passive:false});

  orb.appendChild(btn);
  solar.appendChild(orb);
  planetBtns.push(btn);

  // pill
  const pill = document.createElement('div');
  pill.className = 'name-pill';
  pill.textContent = p.name.toUpperCase();
  pill.style.cssText = `color:${p.color};border-color:${p.color}55;background:${p.color}12;`;
  pill.addEventListener('click', triggerFn);
  nameBar.appendChild(pill);
});

// Explosion
function explode(btn, color) {
  const r = btn.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;

  for (let i = 0; i < 24; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const angle = (i/24)*Math.PI*2;
    const dist = 55 + Math.random()*85;
    const sz = 3 + Math.random()*7;
    const dur = (0.45 + Math.random()*0.45) + 's';
    el.style.cssText = `
      left:${cx}px;top:${cy}px;
      width:${sz}px;height:${sz}px;
      background:${color};
      box-shadow:0 0 5px ${color};
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      --dur:${dur};
      margin-left:-${sz/2}px;margin-top:-${sz/2}px;
    `;
    document.body.appendChild(el);
    const t = parseFloat(dur)*1000;
    setTimeout(() => el.remove(), t + 100);
  }

  // planet break apart effect
  btn.style.transition = 'transform 0.15s ease-out, opacity 0.35s ease-out';
  btn.style.transform = 'translateX(-50%) translateY(-50%) scale(2.2)';
  btn.style.opacity = '0';
  setTimeout(() => {
    btn.style.transition = 'none';
    btn.style.transform = 'translateX(-50%) translateY(-50%) scale(1)';
    btn.style.opacity = '1';
    setTimeout(() => { btn.style.transition = ''; }, 30);
  }, 420);
}

// Popup
const popup = document.getElementById('popup');

function trigger(p, btn) {
  explode(btn, p.color);

  document.getElementById('pOrb').style.cssText = `background:${p.bg};box-shadow:0 0 25px ${p.glow};width:64px;height:64px;border-radius:50%;margin:0 auto 14px;animation:orbFloat 2.8s ease-in-out infinite;`;
  document.getElementById('pName').textContent = p.name.toUpperCase();
  document.getElementById('pSub').textContent = p.sub;
  document.getElementById('pDesc').textContent = p.desc;

  const stats = document.getElementById('pStats');
  stats.innerHTML = p.stats.map(([l,v]) =>
    `<div class="stat-box"><div class="stat-label">${l}</div><div class="stat-value">${v}</div></div>`
  ).join('');

  popup.classList.add('show');
}

document.getElementById('pClose').addEventListener('click', () => popup.classList.remove('show'));
document.getElementById('backdrop').addEventListener('click', () => popup.classList.remove('show'));
</script>
</body>
</html>
